services:
  dataflow:
    build: .
    container_name: dataflow
    ports:
      - "3460:3460"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - DB_DIR=/app/data
      - PORT=3460
      - TRUST_PROXY=1
      - SECURE_COOKIE=false
    restart: always
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
